<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    .a-enter-vr { display: none !important; }
    
    /* Overlay for status updates */
    #status-bar {
      position: absolute; top: 0; left: 0; width: 100%; 
      background: rgba(0,0,0,0.8); color: white; padding: 15px;
      text-align: center; z-index: 10; font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="status-bar">Scanning for Marietta Plaque...</div>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; uiScanning: yes;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="enslavedModel" src="./enslaved.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="1.5"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <a-box position="0 0 0" scale="0.1 0.1 0.1" material="color: red; opacity: 0.6"></a-box>

      <a-gltf-model 
        src="#enslavedModel" 
        position="0 0 0.1" 
        scale="0.3 0.3 0.3" 
        rotation="0 0 0"
        animation-mixer>
      </a-gltf-model>

    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const status = document.getElementById('status-bar');

    sceneEl.addEventListener('targetFound', () => {
      status.innerText = "🎯 Target Found! Displaying Sculpture...";
      status.style.background = "rgba(0, 150, 0, 0.9)";
    });

    sceneEl.addEventListener('targetLost', () => {
      status.innerText = "Scanning for Marietta Plaque...";
      status.style.background = "rgba(0, 0, 0, 0.8)";
    });
  </script>

</body>
</html>
