<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #loading-screen {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px; font-family: sans-serif;
      color: white; background: rgba(0,0,0,0.6);
      padding: 10px 20px; border-radius: 8px; z-index: 999;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="loading-screen">Loading AR experience...</div>

<a-scene mindar-image="imageTargetSrc: https://github.com/dddanimation/Vibeurkn0j9/raw/main/targets.mind; maxTrack: 1;"
         color-space="sRGB"
         vr-mode-ui="enabled: false"
         device-orientation-permission-ui="enabled: true">

  <a-assets>
    <a-asset-item id="model" src="https://github.com/dddanimation/Vibeurkn0j9/raw/main/enslaved.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Marker target -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model src="#model" position="0 0 0" scale="0.25 0.25 0.25" animation-mixer></a-gltf-model>
  </a-entity>

</a-scene>

<script>
  const loadingScreen = document.getElementById('loading-screen');
  document.querySelector('a-scene').addEventListener('loaded', () => {
    loadingScreen.style.display = 'none';
    console.log("AR scene loaded.");
  });
</script>

</body>
</html>
