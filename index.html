<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #overlay {
      position: absolute; top: 10px; left: 10px; z-index: 1000;
      background: rgba(0,0,0,0.7); color: white; padding: 10px;
      font-family: monospace; border-radius: 5px;
    }
  </style>
</head>
<body>

<div id="overlay">Status: Waiting for Target...</div>

<a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; maxTrack: 1; uiScanning: yes;" 
         color-space="sRGB" renderer="colorManagement: true; antialias: true;" vr-mode-ui="enabled: false">

  <a-assets>
    <a-asset-item id="sculpture" src="./enslaved.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-box position="0 0 0" scale="0.1 0.1 0.1" material="color: red; opacity: 0.8"></a-box>

    <a-gltf-model src="#sculpture" 
                  position="0 0 0.1" 
                  scale="0.05 0.05 0.05" 
                  animation-mixer>
    </a-gltf-model>
  </a-entity>

</a-scene>

<script>
  const sceneEl = document.querySelector('a-scene');
  const overlay = document.getElementById('overlay');

  sceneEl.addEventListener('targetFound', () => {
    overlay.innerText = "🎯 TARGET FOUND";
    overlay.style.color = "#0f0";
  });

  sceneEl.addEventListener('targetLost', () => {
    overlay.innerText = "❌ TARGET LOST";
    overlay.style.color = "#f00";
  });
</script>
</body>
</html>
