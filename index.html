<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    .a-enter-vr { display: none !important; }

    /* Smooth fade-out for the welcome screen */
    #welcome-message.hidden {
      opacity: 0;
      transition: opacity 1.5s ease-out;
      pointer-events: none;
    }

    #welcome-message {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      flex-direction: column; color: white;
      background: rgba(0, 0, 0, 0.95); z-index: 1000; padding: 20px;
      box-sizing: border-box; text-align: center;
    }

    .preview-image {
      width: 220px; border: 2px solid white; border-radius: 8px;
      margin: 20px 0; background: #222;
    }

    #help-button {
      position: absolute; top: 20px; right: 120px; width: 42px; height: 42px;
      border-radius: 50%; background: rgba(0,0,0,0.8); color: white;
      border: 1px solid #fff; font-size: 20px; cursor: pointer; z-index: 999;
    }

    .social-btn {
      position: absolute; top: 22px; left: 20px; z-index: 999;
    }
  </style>
</head>
<body>

  <div id="welcome-message">
    <h1 style="letter-spacing: 2px;">FOUNDATIONS AR</h1>
    <p style="max-width: 300px;">Allow camera access and point your phone at the plaque marker:</p>
    
    <img src="./enslaved.jpg" alt="Artwork Marker" class="preview-image">
    
    <p style="font-size: 0.85em; opacity: 0.8;"><i>Scan the image to reveal the 3D sculpture.</i></p>
  </div>

  <div class="social-btn">
    <a href="https://www.instagram.com/qrcky/" target="_blank">
      <img src="./insta.png" alt="Instagram" style="height: 30px; opacity: 0.9;" />
    </a>
  </div>

  <button id="help-button" aria-label="Help">i</button>

  <button onclick="window.open('https://www.qrcky.net/', '_blank')"
    style="position: absolute; top: 20px; right: 20px; padding: 10px 18px; background: #000; color: #fff; border: 1px solid #fff; border-radius: 6px; z-index: 999; font-weight: bold; cursor: pointer;">
    Inquiry
  </button>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterMinCF: 0.0005; filterBeta: 0.01;" 
           color-space="sRGB" renderer="colorManagement: true; antialias: true;" vr-mode-ui="enabled: false">

    <a-assets>
      <a-asset-item id="sculpture" src="./enslaved.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.6"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model src="#sculpture" 
                    position="0 0 0.1" 
                    scale="0.3 0.3 0.3" 
                    rotation="0 0 0"
                    animation-mixer>
      </a-gltf-model>
    </a-entity>

  </a-scene>

  <script>
    const welcome = document.getElementById('welcome-message');
    
    // Transitions the welcome screen out so the camera can be seen
    setTimeout(() => {
      welcome.classList.add('hidden');
      setTimeout(() => { welcome.style.display = 'none'; }, 1500);
    }, 4500);

    document.getElementById('help-button').addEventListener('click', () => {
      alert("Instructions:\n1. Hold phone steady over the plaque.\n2. Ensure there's no heavy glare on the image.\n3. The 3D sculpture will 'lock' onto the marker.");
    });
  </script>
</body>
</html>
